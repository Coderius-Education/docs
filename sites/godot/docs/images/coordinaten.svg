<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 300 200" width="400" height="300" font-family="Arial, sans-serif">
  <!-- Achtergrond -->
  <rect x="-20" y="-20" width="300" height="200" fill="#2c2c2c" rx="8" />
  
  <!-- Grid lijnen (optioneel, subtiel) -->
  <path d="M 0 50 L 250 50 M 0 100 L 250 100 M 0 150 L 250 150 M 50 0 L 50 150 M 100 0 L 100 150 M 150 0 L 150 150 M 200 0 L 200 150" stroke="#3c3c3c" stroke-width="1" />

  <!-- Pijlen (Assen) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#61afef" />
    </marker>
  </defs>

  <!-- X-As -->
  <line x1="0" y1="0" x2="230" y2="0" stroke="#61afef" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="210" y="-10" fill="#61afef" font-size="16" font-weight="bold">X</text>
  
  <!-- Y-As -->
  <line x1="0" y1="0" x2="0" y2="150" stroke="#61afef" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="10" y="145" fill="#61afef" font-size="16" font-weight="bold">Y</text>

  <!-- Oorsprong (0,0) -->
  <circle cx="0" cy="0" r="4" fill="#e5c07b" />
  <text x="-15" y="-10" fill="#e5c07b" font-size="14" font-weight="bold">(0,0)</text>

  <!-- Extra uitleg -->
  <text x="20" y="40" fill="#abb2bf" font-size="12">Naar rechts: X wordt groter (+)</text>
  <text x="20" y="80" fill="#abb2bf" font-size="12">Naar onder: Y wordt groter (+)</text>

</svg>
